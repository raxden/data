name: Generate Favicons with Logo.dev (All)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-favicons:
    name: Generate Favicons
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Create directory structure
        run: mkdir -p radio/stations/favicons_logodev

      - name: Generate favicons for all stations
        env:
          LOGO_TOKEN: ${{ secrets.LOGO_TOKEN }}
          PYTHONUNBUFFERED: 1
        run: |
          python -u .github/scripts/radio/generate_favicons_logodev.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add radio/stations/favicons_logodev/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Generate favicons with logo.dev (all stations)"
            git pull --rebase origin master
            git push
          fi

name: Radio Favicons Sync (All)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-favicons:
    name: Process Favicons
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 Pillow

      - name: Create directory structure
        run: mkdir -p radio/stations/favicons

      - name: Process favicons for all stations
        env:
          PYTHONUNBUFFERED: 1
        run: |
          python -u .github/scripts/radio/process_favicons.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add radio/stations/favicons/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update radio station favicons (all stations)"
            git pull --rebase origin master
            git push
          fi

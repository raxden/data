name: Update Euribor Data

on:
  schedule:
    # Ejecuta de lunes a viernes a las 11:00 AM UTC (13:00 PM CEST)
    # 2 horas después de la publicación oficial del Euribor (11:00 AM CET)
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    # Permite ejecución manual desde GitHub Actions

jobs:
  update-euribor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: Run daily Euribor scraper
        run: |
          python .github/scripts/euribor/fetch_daily_euribor.py
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code euribor/data euribor/report || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add euribor/data euribor/report
          git commit -m "chore: update Euribor data - $(date +'%Y-%m-%d')"
          git push
      
      - name: No changes detected
        if: steps.git-check.outputs.changed != 'true'
        run: |
          echo "No changes detected in Euribor data"

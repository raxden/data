name: Radio Stations Sync

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-stations:
    name: Download All Stations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create directory structure
        run: mkdir -p radio/stations

      - name: Download all stations
        run: |
          curl -s "https://de1.api.radio-browser.info/json/stations?limit=1000000" \
            -o "radio/stations/all"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add radio/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update all radio stations data"
            git push
          fi
